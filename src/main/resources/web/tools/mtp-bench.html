<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page.mtp_bench.title">MTP Benchmark</title>
  <link rel="stylesheet" href="../css/all.min.css" />
  <link href="../css/css2.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/index.css" />
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:var(--bg-color); color:var(--text-primary); font-family:"Microsoft YaHei","Inter",sans-serif; }
    .page { position:fixed; inset:0; display:flex; flex-direction:column; overflow:hidden; }
    .top { display:flex; align-items:center; gap:10px; padding:12px 18px; border-bottom:1px solid var(--border-color); background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0)) var(--sidebar-bg); flex-shrink:0; flex-wrap:wrap; }
    .top .title { display:flex; align-items:center; gap:10px; font-size:16px; font-weight:800; margin:0; }
    .content { flex:1 1 0; min-height:0; padding:12px 18px; display:grid; grid-template-columns:280px 1fr; gap:12px; overflow:hidden; }
    .card { background:var(--card-bg); border:1px solid var(--border-color); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:8px; box-shadow:0 8px 20px rgba(0,0,0,0.06); min-height:0; }
    .card.stretch { flex:1 1 0; overflow:hidden; }
    .card.shrink { flex-shrink:0; }
    .left-col { display:flex; flex-direction:column; gap:12px; min-height:0; }
    .row { display:flex; flex-direction:column; gap:4px; }
    .row label { font-size:11px; color:var(--text-secondary); font-weight:500; }
    .form-control { width:100%; padding:5px 8px; border:1px solid var(--border-color); border-radius:6px; font-size:12px; font-family:inherit; background:var(--card-bg); color:var(--text-primary); box-sizing:border-box; }
    .form-control:focus { outline:none; border-color:rgba(99,102,241,0.5); }
    .form-control:disabled { opacity:0.5; cursor:not-allowed; background:var(--disabled-bg); }
    .model-menu { display:flex; flex-direction:column; gap:4px; overflow:auto; flex:1 1 0; min-height:0; padding:2px 0; }
    .model-menu-item { width:100%; display:grid; grid-template-columns:1fr; gap:2px; border:1px solid var(--border-color); border-left:3px solid transparent; border-radius:8px; padding:7px 10px; background:rgba(255,255,255,0.02); color:var(--text-primary); cursor:pointer; text-align:left; font-family:inherit; font-size:12px; transition:all 0.15s; }
    .model-menu-item:hover { border-color:rgba(99,102,241,0.45); background:rgba(99,102,241,0.08); }
    .model-menu-item.active { border-color:rgba(99,102,241,0.75); background:rgba(99,102,241,0.14); }
    .model-menu-item.loaded:not(.active) { border-color:rgba(16,185,129,0.55); background:rgba(16,185,129,0.10); }
    .model-menu-item .name { font-weight:700; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .model-menu-item .meta { font-size:11px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .node-badge { display:inline-block; font-size:10px; font-weight:600; padding:1px 6px; border-radius:999px; margin-left:4px; vertical-align:middle; }
    .node-section-header { display:flex; align-items:center; gap:6px; padding:6px 10px 3px; font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; flex-shrink:0; user-select:none; }
    .node-section-header .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex-shrink:0; }
    .hint { color:var(--text-secondary); font-size:12px; }
    .section-title { font-size:13px; font-weight:700; flex-shrink:0; display:flex; align-items:center; gap:6px; }
    .section-title i { color:var(--primary-color); }
    .result-table { width:100%; border-collapse:collapse; font-size:12px; }
    .result-table th, .result-table td { border:1px solid var(--border-color); padding:5px 8px; text-align:left; white-space:nowrap; }
    .result-table th { background:var(--sidebar-bg); color:var(--text-secondary); font-weight:600; position:sticky; top:0; z-index:1; }
    .result-table tbody tr:nth-child(even) { background:rgba(255,255,255,0.02); }
    .result-table tbody tr:hover { background:rgba(99,102,241,0.08); }
    .result-table tr.aggregate-row td { border-top:2px solid rgba(99,102,241,0.65); background:rgba(99,102,241,0.08); font-weight:700; }
    .result-table .empty { text-align:center; color:var(--text-secondary); padding:30px; }
    .speed-fast { color:#10b981; }
    .speed-mid { color:#f59e0b; }
    .speed-slow { color:#ef4444; }
    .acc-fast { color:#10b981; }
    .acc-mid { color:#f59e0b; }
    .acc-slow { color:#ef4444; }
    .run-status { display:inline-flex; align-items:center; gap:4px; font-size:11px; }
    .run-status.running { color:#f59e0b; }
    .run-status.done { color:#10b981; }
    .run-status.err { color:#ef4444; }
    .progress-bar { width:100%; height:4px; background:var(--border-color); border-radius:2px; overflow:hidden; flex-shrink:0; }
    .progress-bar .fill { height:100%; background:var(--primary-color); border-radius:2px; transition:width 0.3s; }
    .rec-area { flex:1 1 0; min-height:0; overflow:hidden; display:flex; flex-direction:column; gap:8px; }
    .rec-table-wrap { flex:1 1 0; min-height:0; overflow:auto; }
    .rec-table-wrap.shrink { flex-shrink:0; max-height:200px; flex:none; }
    .diff-table { width:100%; border-collapse:collapse; font-size:12px; }
    .diff-table th, .diff-table td { border:1px solid var(--border-color); padding:5px 8px; text-align:left; white-space:nowrap; }
    .diff-table th { background:var(--sidebar-bg); color:var(--text-secondary); font-weight:600; position:sticky; top:0; z-index:1; }
    .diff-pos { color:#10b981; }
    .diff-neg { color:#ef4444; }
    .diff-zero { color:var(--text-secondary); }
    .diff-section { margin-bottom:12px; }
    .diff-section-title { font-size:13px; font-weight:700; margin-bottom:6px; color:var(--primary-color); }
    .diff-selectors { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .diff-selectors select { min-width:200px; }
    .diff-modal { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; }
    .diff-modal-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    .diff-modal-content { position:relative; z-index:1; width:90%; max-width:900px; max-height:85vh; background:var(--card-bg); border:1px solid var(--border-color); border-radius:12px; box-shadow:0 16px 48px rgba(0,0,0,0.3); display:flex; flex-direction:column; overflow:hidden; }
    .diff-modal-header { display:flex; align-items:center; gap:10px; padding:12px 40px 12px 16px; border-bottom:1px solid var(--border-color); flex-shrink:0; position:relative; }
    .diff-modal-body { padding:16px; display:flex; flex-direction:column; gap:12px; overflow:auto; min-height:0; }
    .diff-result-wrap { overflow:auto; max-height:50vh; }
    .diff-modal-close { position:absolute; top:10px; right:10px; width:28px; height:28px; border:none; border-radius:50%; background:rgba(255,255,255,0.06); color:var(--text-secondary); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; line-height:1; padding:0; }
    .diff-modal-close:hover { background:rgba(239,68,68,0.15); color:#ef4444; transform:rotate(90deg); }
    @media (max-width:960px) { .content { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1 class="title"><i class="fas fa-layer-group"></i> <span data-i18n="page.mtp_bench.title">MTP Benchmark</span></h1>
    <button id="helpBtn" class="btn" title="帮助" style="font-size:14px; padding:4px 10px;"><i class="fas fa-question-circle"></i></button>
    <div class="actions" style="margin-left:auto;">
      <button id="runBtn" class="btn btn-primary" data-i18n="page.mtp_bench.action.run">开始测试</button>
      <button id="exportBtn" class="btn" data-i18n="page.mtp_bench.action.export">导出 JSON</button>
      <button id="copyTextBtn" class="btn" data-i18n="page.mtp_bench.action.copy_text">复制文本</button>
      <button id="refreshBtn" class="btn" data-i18n="page.mtp_bench.action.refresh">刷新</button>
    </div>
  </div>
  <div class="content">
    <div class="left-col">
      <div class="card shrink">
        <div class="row">
          <label data-i18n="page.mtp_bench.label.node">节点</label>
          <select id="nodeSelect" class="form-control"></select>
        </div>
        <div class="row">
          <label data-i18n="page.mtp_bench.label.max_tokens">Max Tokens</label>
          <input id="maxTokensInput" type="number" class="form-control" value="192" min="1" />
        </div>
        <div class="row">
          <label data-i18n="page.mtp_bench.label.seed">Seed</label>
          <input id="seedInput" type="number" class="form-control" value="42" min="0" />
        </div>
      </div>
      <div class="card stretch">
        <div class="section-title"><i class="fas fa-robot"></i> <span data-i18n="page.mtp_bench.section.models">模型</span></div>
        <input id="modelSearchInput" type="text" class="form-control" placeholder="搜索…" style="margin-bottom:6px; flex-shrink:0;" />
        <div id="modelList" class="model-menu"></div>
      </div>
    </div>
    <div class="right-col" style="display:flex; flex-direction:column; gap:12px; min-height:0; overflow:hidden;">
      <div class="card stretch" style="overflow:hidden;">
        <div class="section-title"><i class="fas fa-chart-bar"></i> <span data-i18n="page.mtp_bench.section.current">当前结果</span> <span id="statusText" class="hint" style="margin-left:auto;"></span></div>
        <div id="progressWrap" class="progress-bar" style="display:none;"><div class="fill" id="progressFill" style="width:0%"></div></div>
        <div class="rec-table-wrap">
          <table class="result-table" id="currentTable">
            <thead>
              <tr>
                <th data-i18n="page.mtp_bench.table.prompt">Prompt</th>
                <th data-i18n="page.mtp_bench.table.wall_s">Wall(s)</th>
                <th data-i18n="page.mtp_bench.table.predicted_n">Pred</th>
                <th data-i18n="page.mtp_bench.table.draft_n">Draft</th>
                <th data-i18n="page.mtp_bench.table.draft_accepted">Acc</th>
                <th data-i18n="page.mtp_bench.table.accept_rate">Acc Rate</th>
                <th data-i18n="page.mtp_bench.table.tok_per_sec">tok/s</th>
                <th data-i18n="page.mtp_bench.table.status">状态</th>
              </tr>
            </thead>
            <tbody id="currentBody">
              <tr><td class="empty" colspan="8" data-i18n="page.mtp_bench.empty.no_result">请选择模型并运行测试</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card stretch" style="overflow:hidden;">
        <div class="section-title"><i class="fas fa-clock-rotate-left"></i> <span data-i18n="page.mtp_bench.section.history">历史记录</span>
          <button id="clearHistoryBtn" class="btn" style="margin-left:auto; font-size:11px;" data-i18n="page.mtp_bench.action.clear_history">清空</button></div>
        <div class="rec-table-wrap shrink">
          <table class="result-table">
            <thead>
              <tr>
                <th data-i18n="page.mtp_bench.table.time">时间</th>
                <th data-i18n="page.mtp_bench.table.model">模型</th>
                <th data-i18n="page.mtp_bench.table.node">节点</th>
                <th data-i18n="page.mtp_bench.table.total_pred">总 Pred</th>
                <th data-i18n="page.mtp_bench.table.total_draft">总 Draft</th>
                <th data-i18n="page.mtp_bench.table.acc_rate">Acc Rate</th>
                <th data-i18n="page.mtp_bench.table.wall_total">Wall(s)</th>
                <th data-i18n="page.mtp_bench.table.actions">操作</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr><td class="empty" colspan="8" data-i18n="page.mtp_bench.empty.no_history">暂无历史记录</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Diff Modal -->
<div id="diffModal" class="diff-modal" style="display:none;">
  <div class="diff-modal-overlay"></div>
  <div class="diff-modal-content">
    <div class="diff-modal-header">
      <div class="section-title"><i class="fas fa-code-compare"></i> <span data-i18n="page.mtp_bench.section.diff">对比</span></div>
      <button id="closeDiffBtn" class="diff-modal-close" title="关闭">&times;</button>
    </div>
    <div class="diff-modal-body">
      <div class="diff-selectors">
        <select id="diffA" class="form-control"><option value="">— 记录 A —</option></select>
        <select id="diffB" class="form-control"><option value="">— 记录 B —</option></select>
        <button id="diffRunBtn" class="btn btn-primary" data-i18n="page.mtp_bench.action.compare">对比</button>
      </div>
      <div class="diff-result-wrap" id="diffResult"></div>
    </div>
  </div>
</div>
<div id="helpModal" class="diff-modal" style="display:none;">
  <div class="diff-modal-overlay"></div>
  <div class="diff-modal-content" style="max-width:680px;">
    <div class="diff-modal-header">
      <div class="section-title"><i class="fas fa-info-circle"></i> <span data-i18n="page.mtp_bench.help.title">参数说明</span></div>
      <button id="closeHelpBtn" class="diff-modal-close" title="关闭">&times;</button>
    </div>
    <div class="diff-modal-body" id="helpContent"></div>
  </div>
</div>
<script src="/js/i18n.js"></script>
<script>
(function() {
  const PROMPTS = [
    { name:"code_python", prompt:"Write a Python function that returns the n-th Fibonacci number using memoization. Include a docstring." },
    { name:"code_cpp", prompt:"Write a C++ template function `clamp(x, lo, hi)` that returns x clamped to [lo, hi]. No std::clamp." },
    { name:"explain_concept", prompt:"Explain how speculative decoding works in large language model inference, in three short paragraphs." },
    { name:"summarize", prompt:"Summarize in two sentences: The Industrial Revolution began in Britain in the late 18th century, transforming manufacturing through mechanization, steam power, and the factory system. It spread to continental Europe and North America during the 19th century." },
    { name:"qa_factual", prompt:"Q: What are the four fundamental forces of physics?\nA:" },
    { name:"translation", prompt:"Translate to French: 'The quick brown fox jumps over the lazy dog.'" },
    { name:"creative_short", prompt:"Write a four-line poem about an old lighthouse." },
    { name:"stepwise_math", prompt:"Solve step by step: A train leaves station A at 60 km/h. Two hours later, a second train leaves the same station on the same track at 90 km/h. How long until the second train catches the first?" },
    { name:"long_code_review", prompt:(
      "You are reviewing a backend service that has been suffering intermittent latency spikes "
      + "in production. Below is the relevant code and a description of the system. After reading "
      + "carefully, produce a structured review with three sections: (1) likely root causes ranked "
      + "by probability, (2) concrete code or configuration changes you would make first, "
      + "(3) what telemetry you would add to confirm the diagnosis.\n\n"
      + "System description: a Python FastAPI service in front of a Postgres 15 database, deployed "
      + "as four replicas behind an nginx load balancer. Each request reads a user record, fetches "
      + "their last 50 events from a partitioned events table, computes an aggregate score, writes "
      + "the score back to the user row, and returns a JSON response. Average payload is 4 KB. "
      + "p50 latency is 35 ms; p99 spikes to 1.8 seconds approximately every 90 seconds in a "
      + "regular pattern. The spikes correlate with elevated Postgres CPU but not with elevated "
      + "Postgres connection count. The application pool is sized at 20 connections per replica. "
      + "PgBouncer is in front of Postgres in transaction pooling mode with a pool size of 50.\n\n"
      + "Code excerpt — the hot endpoint:\n"
      + "```python\n@app.post('/score/{user_id}')\nasync def score(user_id: int, payload: ScoreRequest):\n"
      + "    async with db.transaction() as tx:\n        user = await tx.fetchrow(\n"
      + "            'SELECT id, tier, last_score FROM users WHERE id = $1 FOR UPDATE',\n            user_id,\n        )\n"
      + "        if user is None:\n            raise HTTPException(404)\n        events = await tx.fetch(\n"
      + "            'SELECT type, weight, ts FROM events '\n            'WHERE user_id = $1 ORDER BY ts DESC LIMIT 50',\n            user_id,\n        )\n"
      + "        new_score = compute_score(user['tier'], events, payload.signals)\n"
      + "        await tx.execute(\n            'UPDATE users SET last_score = $1, updated_at = now() WHERE id = $2',\n            new_score, user_id,\n        )\n"
      + "        await tx.execute(\n            'INSERT INTO score_history (user_id, score, ts) VALUES ($1, $2, now())',\n            user_id, new_score,\n        )\n"
      + "    await cache.set(f'score:{user_id}', new_score, ex=300)\n"
      + "    metrics.histogram('score.latency_ms').observe((time.time() - start) * 1000)\n"
      + "    return {'user_id': user_id, 'score': new_score}\n```\n\n"
      + "Schema notes: `users` is ~50M rows, `events` is partitioned by month with ~2B rows total "
      + "and a btree index on `(user_id, ts DESC)`. `score_history` is unpartitioned, ~800M rows, "
      + "with a single index on `user_id`. Postgres autovacuum is at default settings. There is "
      + "a nightly batch job that rebuilds materialized views starting at 02:00 UTC; spikes occur "
      + "throughout the day, not just during the batch window. Connection pooling metrics show "
      + "PgBouncer waiting connections occasionally hit 8-12 during spikes but never saturate. "
      + "CPU on the FastAPI replicas stays below 30% even during spikes. Network round-trip time "
      + "between the application and Postgres is consistently 0.4 ms.\n\nBegin your review now."
    )}
  ];

  const els = {
    nodeSelect: document.getElementById('nodeSelect'),
    maxTokensInput: document.getElementById('maxTokensInput'),
    seedInput: document.getElementById('seedInput'),
    modelSearchInput: document.getElementById('modelSearchInput'),
    modelList: document.getElementById('modelList'),
    runBtn: document.getElementById('runBtn'),
    exportBtn: document.getElementById('exportBtn'),
    copyTextBtn: document.getElementById('copyTextBtn'),
    helpBtn: document.getElementById('helpBtn'),
    refreshBtn: document.getElementById('refreshBtn'),
    statusText: document.getElementById('statusText'),
    progressWrap: document.getElementById('progressWrap'),
    progressFill: document.getElementById('progressFill'),
    currentBody: document.getElementById('currentBody'),
    historyBody: document.getElementById('historyBody'),
    clearHistoryBtn: document.getElementById('clearHistoryBtn'),
    diffModal: document.getElementById('diffModal'),
    diffA: document.getElementById('diffA'),
    diffB: document.getElementById('diffB'),
    diffRunBtn: document.getElementById('diffRunBtn'),
    diffResult: document.getElementById('diffResult'),
    closeDiffBtn: document.getElementById('closeDiffBtn'),
    helpModal: document.getElementById('helpModal'),
    closeHelpBtn: document.getElementById('closeHelpBtn'),
    helpContent: document.getElementById('helpContent'),
  };

  let allModels = [];
  let loadedModels = [];
  let loadedModelIds = new Set();
  let nodes = [];
  let selectedNodeId = '';
  let selectedModelId = '';
  let modelFilterText = '';
  let currentRunResult = null;
  let abortController = null;
  let isRunning = false;

  function t(key, fallback) {
    if (window.I18N && typeof window.I18N.t === 'function') return window.I18N.t(key, fallback);
    return fallback != null ? fallback : key;
  }

  function safeText(v) { return v == null ? '' : String(v); }

  async function fetchJson(url, options) {
    const resp = await fetch(url, options || {});
    const text = await resp.text();
    let json = null;
    try { json = JSON.parse(text); } catch(e) { json = { success:false, error:text || '请求失败' }; }
    if (!resp.ok) throw new Error((json && json.error) ? json.error : '请求失败');
    return json;
  }

  function formatNum(v) {
    if (v == null || v === '') return '-';
    const n = Number(v);
    if (!Number.isFinite(n)) return String(v);
    return n.toFixed(2).replace(/\.?0+$/, '');
  }

  function speedClass(v, type) {
    if (v == null) return '';
    const n = Number(v);
    if (!Number.isFinite(n)) return '';
    if (type === 'acc') {
      if (n > 0.6) return 'acc-fast';
      if (n > 0.4) return 'acc-mid';
      return 'acc-slow';
    }
    if (n > 50) return 'speed-fast';
    if (n > 20) return 'speed-mid';
    return 'speed-slow';
  }

  function nodeHue(nodeId) {
    let h = 0;
    for (let i = 0; i < nodeId.length; i++) h = ((h << 5) - h + nodeId.charCodeAt(i)) | 0;
    return Math.abs(h) % 360;
  }

  function nodeBadge(nodeId) {
    if (!nodeId) return '';
    const hue = nodeHue(nodeId);
    return `<span class="node-badge" style="background:hsla(${hue},60%,50%,0.15); color:hsl(${hue},60%,50%);">${nodeId}</span>`;
  }

  function getModelDisplayName(m) {
    const alias = m && typeof m.alias === 'string' ? m.alias.trim() : '';
    const name = m && typeof m.name === 'string' ? m.name.trim() : '';
    return alias || name || safeText(m && m.id);
  }

  function modelCompositeKey(nodeId, modelId) {
    return (nodeId || 'local') + '::' + modelId;
  }

  // ── Load models & nodes ──
  async function loadModels() {
    try {
      const [loadedData, allData, nodesData] = await Promise.all([
        fetchJson('/v1/models', { method:'GET' }).catch(() => ({ data:[] })),
        fetchJson('/api/models/list', { method:'GET' }).catch(() => ({ success:false, models:[] })),
        fetchJson('/api/node/list', { method:'GET' }).catch(() => ({ success:false, nodes:[] }))
      ]);
      loadedModels = Array.isArray(loadedData && loadedData.data) ? loadedData.data : [];
      loadedModelIds = new Set(loadedModels.map(m => {
        const nid = m && m.nodeId ? safeText(m.nodeId) : 'local';
        const mid = m && (m.id || m.model);
        const v = safeText(mid).trim();
        return v ? (nid + '::' + v) : '';
      }).filter(Boolean));
      allModels = Array.isArray((allData && allData.models)) ? allData.models : [];
      nodes = Array.isArray((nodesData && nodesData.data)) ? nodesData.data : [];
      renderNodeSelect();
      renderModelList();
    } catch(e) {
      setStatus(e.message || t('page.mtp_bench.status.load_failed', '加载失败'));
    }
  }

  function renderNodeSelect() {
    els.nodeSelect.innerHTML = '';
    const allOpt = document.createElement('option');
    allOpt.value = 'all';
    allOpt.textContent = t('page.mtp_bench.node.all', '全部');
    els.nodeSelect.appendChild(allOpt);
    const localOpt = document.createElement('option');
    localOpt.value = 'local';
    localOpt.textContent = t('page.mtp_bench.node.local', '本地');
    els.nodeSelect.appendChild(localOpt);
    for (const n of nodes) {
      if (!n.enabled) continue;
      const opt = document.createElement('option');
      opt.value = n.nodeId;
      opt.textContent = (n.name || n.nodeId);
      els.nodeSelect.appendChild(opt);
    }
    els.nodeSelect.value = selectedNodeId || 'all';
  }

  function matchesFilter(m) {
    if (!modelFilterText) return true;
    const q = modelFilterText.toLowerCase();
    const id = safeText(m && m.id).toLowerCase();
    const name = getModelDisplayName(m).toLowerCase();
    return id.includes(q) || name.includes(q);
  }

  function getNodeLabel(nodeId) {
    if (!nodeId || nodeId === 'local') return t('page.mtp_bench.node.local', '本地');
    const n = nodes.find(x => x.nodeId === nodeId);
    return n ? (n.name || n.nodeId) : nodeId;
  }

  function renderModelList() {
    els.modelList.innerHTML = '';
    let list = allModels.slice().filter(matchesFilter);
    if (selectedNodeId && selectedNodeId !== 'all') {
      const targetNid = selectedNodeId;
      list = list.filter(m => {
        const nid = safeText(m && m.nodeId) || 'local';
        return nid === targetNid;
      });
    }
    list.sort((a, b) => {
      const na = getModelDisplayName(a).toLowerCase();
      const nb = getModelDisplayName(b).toLowerCase();
      return na.localeCompare(nb);
    });
    if (!list.length) {
      const d = document.createElement('div');
      d.className = 'hint';
      d.textContent = allModels.length ? t('page.mtp_bench.empty.no_match', '无匹配模型') : t('page.mtp_bench.empty.no_models', '暂无模型');
      els.modelList.appendChild(d);
      return;
    }

    // Group by nodeId: "local" first, then remote nodes sorted by nodeId
    const groups = {};
    const groupOrder = [];
    for (const m of list) {
      const nid = safeText(m && m.nodeId) || 'local';
      if (!groups[nid]) { groups[nid] = []; groupOrder.push(nid); }
      groups[nid].push(m);
    }
    groupOrder.sort((a, b) => {
      if (a === 'local') return -1;
      if (b === 'local') return 1;
      return a.localeCompare(b);
    });

    for (const nid of groupOrder) {
      const grp = groups[nid];
      if (!grp.length) continue;
      const hue = nodeHue(nid);
      const label = getNodeLabel(nid);
      const header = document.createElement('div');
      header.className = 'node-section-header';
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = `hsl(${hue}, 55%, 55%)`;
      header.appendChild(dot);
      header.appendChild(document.createTextNode(label));
      els.modelList.appendChild(header);

      for (const m of grp) {
        const id = safeText(m && m.id).trim();
        if (!id) continue;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'model-menu-item';
        btn.dataset.modelId = id;
        btn.dataset.nodeId = nid;
        btn.style.borderLeftColor = nid === 'local' ? 'transparent' : `hsl(${hue}, 55%, 55%)`;
        const ck = modelCompositeKey(nid, id);
        if (loadedModelIds.has(ck)) btn.classList.add('loaded');
        if (id === selectedModelId && (selectedNodeId === 'all' || nid === selectedNodeId)) btn.classList.add('active');
        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = getModelDisplayName(m);
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = id + (loadedModelIds.has(ck) ? ' · ' + t('page.mtp_bench.model.loaded', '已加载') : '');
        btn.appendChild(nameEl);
        btn.appendChild(metaEl);
        els.modelList.appendChild(btn);
      }
    }
  }

  // ── Run benchmark ──
  function initCurrentTable() {
    els.currentBody.innerHTML = '';
    for (let i = 0; i < PROMPTS.length; i++) {
      const tr = document.createElement('tr');
      tr.id = 'row_' + i;
      const tdName = document.createElement('td');
      tdName.textContent = PROMPTS[i].name;
      tr.appendChild(tdName);
      for (let c = 1; c < 8; c++) {
        const td = document.createElement('td');
        td.id = 'cell_' + i + '_' + c;
        tr.appendChild(td);
      }
      els.currentBody.appendChild(tr);
    }
  }

  function updateRow(i, rec) {
    const cols = [
      rec != null ? formatNum(rec.wall_s) : '',
      rec != null ? (rec.predicted_n != null ? rec.predicted_n : '-') : '',
      rec != null ? (rec.draft_n != null ? rec.draft_n : '-') : '',
      rec != null ? (rec.draft_n_accepted != null ? rec.draft_n_accepted : '-') : '',
      rec != null && rec.accept_rate != null ? formatNum(rec.accept_rate) : '',
      rec != null ? formatNum(rec.predicted_per_second) : '',
    ];
    for (let c = 0; c < cols.length; c++) {
      const td = document.getElementById('cell_' + i + '_' + (c + 1));
      if (!td) continue;
      td.textContent = cols[c];
      td.className = '';
      if (c === 4 && rec && rec.accept_rate != null) td.className = speedClass(rec.accept_rate, 'acc');
      if (c === 5 && rec) td.className = speedClass(rec.predicted_per_second, 'speed');
    }
    const statusTd = document.getElementById('cell_' + i + '_7');
    if (statusTd) {
      if (rec == null) {
        statusTd.innerHTML = '';
      } else if (rec.error) {
        statusTd.innerHTML = '<span class="run-status err">ERR</span>';
      } else {
        statusTd.innerHTML = '<span class="run-status done">OK</span>';
      }
    }
  }

  function setAggregateRow(rec) {
    let aggRow = els.currentBody.querySelector('tr.aggregate-row');
    if (!aggRow) {
      aggRow = document.createElement('tr');
      aggRow.className = 'aggregate-row';
      els.currentBody.appendChild(aggRow);
    }
    const labels = [
      t('page.mtp_bench.aggregate.total', '汇总'),
      rec ? formatNum(rec.wall_s_total) : '-',
      rec ? (rec.total_predicted != null ? rec.total_predicted : '-') : '-',
      rec ? (rec.total_draft != null ? rec.total_draft : '-') : '-',
      rec ? (rec.total_draft_accepted != null ? rec.total_draft_accepted : '-') : '-',
      rec && rec.aggregate_accept_rate != null ? formatNum(rec.aggregate_accept_rate) : '-',
      '', ''
    ];
    while (aggRow.childNodes.length < labels.length) {
      const td = document.createElement('td');
      aggRow.appendChild(td);
    }
    labels.forEach((v, i) => {
      if (aggRow.childNodes[i]) aggRow.childNodes[i].textContent = v;
    });
    const rateTd = aggRow.childNodes[5];
    if (rateTd && rec && rec.aggregate_accept_rate != null) rateTd.className = speedClass(rec.aggregate_accept_rate, 'acc');
  }

  function setStatus(text) {
    if (els.statusText) els.statusText.textContent = text || '';
  }

  function setProgress(pct) {
    if (pct > 0) {
      els.progressWrap.style.display = '';
      els.progressFill.style.width = pct + '%';
    } else {
      els.progressWrap.style.display = 'none';
      els.progressFill.style.width = '0%';
    }
  }

  async function runOnePrompt(prompt, modelId, nodeId, maxTokens, seed, signal) {
    const body = {
      model: modelId,
      messages: [{ role:'user', content: prompt.prompt }],
      max_tokens: maxTokens,
      seed: seed
    };
    if (nodeId) body.nodeId = nodeId;
    const t0 = performance.now();
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: signal
    });
    const wall = (performance.now() - t0) / 1000;
    if (!resp.ok) {
      let errMsg = 'HTTP ' + resp.status;
      try { errMsg = (await resp.json()).error || errMsg; } catch(e) {}
      throw new Error(errMsg);
    }
    const r = await resp.json();
    const usage = r.usage || {};
    const timings = r.timings || {};
    const predicted_n = usage.completion_tokens || timings.predicted_n || 0;
    const predicted_per_second = timings.predicted_per_second || (wall > 0 ? predicted_n / wall : 0);
    const draft_n = timings.draft_n || 0;
    const draft_n_accepted = timings.draft_n_accepted || 0;
    const accept_rate = draft_n ? (draft_n_accepted / draft_n) : null;
    return {
      name: prompt.name,
      wall_s: Math.round(wall * 1000) / 1000,
      predicted_n,
      predicted_per_second: Math.round(predicted_per_second * 100) / 100,
      draft_n,
      draft_n_accepted,
      accept_rate: accept_rate != null ? Math.round(accept_rate * 10000) / 10000 : null
    };
  }

  async function runBenchmark() {
    if (isRunning) {
      if (abortController) abortController.abort();
      setStatus(t('page.mtp_bench.status.cancelling', '取消中…'));
      return;
    }
    const modelId = selectedModelId;
    if (!modelId) {
      setStatus(t('page.mtp_bench.status.select_model', '请选择模型'));
      return;
    }
    const maxTokens = parseInt(els.maxTokensInput.value, 10) || 192;
    const seed = parseInt(els.seedInput.value, 10) || 42;
    const rawNodeId = els.nodeSelect.value || 'all';
    let nodeId;
    if (rawNodeId === 'all') {
      const selModel = allModels.find(m => safeText(m && m.id).trim() === modelId);
      const modelNid = selModel ? (safeText(selModel.nodeId) || 'local') : 'local';
      nodeId = modelNid === 'local' ? '' : modelNid;
    } else if (rawNodeId === 'local') {
      nodeId = '';
    } else {
      nodeId = rawNodeId;
    }
    if (!loadedModelIds.has(modelCompositeKey(nodeId, modelId))) {
      setStatus(t('page.mtp_bench.status.model_not_loaded', '模型未加载'));
      return;
    }

    isRunning = true;
    abortController = new AbortController();
    els.runBtn.textContent = t('page.mtp_bench.action.cancel', '取消');
    els.runBtn.disabled = false;
    initCurrentTable();
    setProgress(0);
    setStatus(t('page.mtp_bench.status.running', '执行中…'));

    const results = [];
    const agg = { n_requests: PROMPTS.length, total_predicted:0, total_draft:0, total_draft_accepted:0, wall_s_total:0 };

    try {
      for (let i = 0; i < PROMPTS.length; i++) {
        if (abortController.signal.aborted) break;
        updateRow(i, null);
        const tdStatus = document.getElementById('cell_' + i + '_7');
        if (tdStatus) tdStatus.innerHTML = '<span class="run-status running"><i class="fas fa-spinner fa-spin"></i></span>';
        setProgress(Math.round((i / PROMPTS.length) * 100));
        setStatus(t('page.mtp_bench.status.running_progress', `${i + 1}/${PROMPTS.length}: ${PROMPTS[i].name}`));
        try {
          const rec = await runOnePrompt(PROMPTS[i], modelId, nodeId, maxTokens, seed, abortController.signal);
          results.push(rec);
          updateRow(i, rec);
          agg.total_predicted += rec.predicted_n || 0;
          agg.total_draft += rec.draft_n || 0;
          agg.total_draft_accepted += rec.draft_n_accepted || 0;
          agg.wall_s_total += rec.wall_s || 0;
        } catch(e) {
          if (e.name === 'AbortError') break;
          results.push({ name: PROMPTS[i].name, error: e.message });
          updateRow(i, { name: PROMPTS[i].name, error: e.message });
        }
      }
      agg.wall_s_total = Math.round(agg.wall_s_total * 100) / 100;
      agg.aggregate_accept_rate = agg.total_draft ? Math.round(agg.total_draft_accepted / agg.total_draft * 10000) / 10000 : null;
      setAggregateRow(agg);
      setProgress(100);

      if (abortController && abortController.signal.aborted) {
        setStatus(t('page.mtp_bench.status.cancelled', '已取消'));
      } else {
        setStatus(`${t('page.mtp_bench.status.done', '完成')} (${results.length}/${PROMPTS.length})`);
        currentRunResult = {
          timestamp: new Date().toISOString(),
          modelId,
          nodeId: nodeId || 'local',
          maxTokens,
          seed,
          results,
          aggregate: agg
        };
        saveToHistory(currentRunResult);
      }
    } catch(e) {
      if (e && e.name !== 'AbortError') {
        setStatus((e && e.message) || t('page.mtp_bench.status.failed', '失败'));
      }
    } finally {
      isRunning = false;
      abortController = null;
      els.runBtn.textContent = t('page.mtp_bench.action.run', '开始测试');
      setTimeout(() => setProgress(0), 2000);
    }
  }

  // ── History (localStorage) ──
  const HISTORY_KEY = 'mtp_bench_history';

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch(e) { return []; }
  }

  function saveHistory(arr) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
  }

  function saveToHistory(rec) {
    const hist = getHistory();
    hist.unshift(rec);
    if (hist.length > 200) hist.length = 200;
    saveHistory(hist);
    renderHistory();
    populateDiffSelects();
  }

  function restoreToCurrent(rec) {
    initCurrentTable();
    const results = rec.results || [];
    for (let i = 0; i < PROMPTS.length; i++) {
      updateRow(i, results[i] || null);
    }
    setAggregateRow(rec.aggregate || {});
    currentRunResult = rec;
    const nodeVal = rec.nodeId || 'local';
    setStatus(`${t('page.mtp_bench.status.restored', '已还原')} | ${rec.modelId} | ${nodeVal} | ${new Date(rec.timestamp).toLocaleString()}`);
  }

  function renderHistory() {
    const hist = getHistory();
    els.historyBody.innerHTML = '';
    if (!hist.length) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.className = 'empty';
      td.colSpan = 8;
      td.textContent = t('page.mtp_bench.empty.no_history', '暂无历史记录');
      tr.appendChild(td);
      els.historyBody.appendChild(tr);
      return;
    }
    for (let i = 0; i < hist.length; i++) {
      const r = hist[i];
      const a = r.aggregate || {};
      const tr = document.createElement('tr');
      const nodeVal = r.nodeId || 'local';
      const cells = [
        new Date(r.timestamp).toLocaleString(),
        r.modelId || '-',
        nodeVal,
        a.total_predicted != null ? a.total_predicted : '-',
        a.total_draft != null ? a.total_draft : '-',
        a.aggregate_accept_rate != null ? formatNum(a.aggregate_accept_rate) : '-',
        formatNum(a.wall_s_total)
      ];
      cells.forEach((v, ci) => {
        const td = document.createElement('td');
        if (ci === 2 && nodeVal !== 'local') {
          td.innerHTML = nodeVal + nodeBadge(nodeVal);
        } else {
          td.textContent = v;
        }
        tr.appendChild(td);
      });
      const tdAct = document.createElement('td');
      const btnView = document.createElement('button');
      btnView.type = 'button';
      btnView.className = 'btn';
      btnView.style.cssText = 'padding:2px 6px; font-size:11px; margin-right:4px;';
      btnView.textContent = t('page.mtp_bench.action.view', '查看');
      btnView.addEventListener('click', () => {
        restoreToCurrent(hist[i]);
      });
      tdAct.appendChild(btnView);
      const btnDel = document.createElement('button');
      btnDel.type = 'button';
      btnDel.className = 'btn';
      btnDel.style.cssText = 'padding:2px 6px; font-size:11px;';
      btnDel.textContent = t('page.mtp_bench.action.delete', '删除');
      btnDel.addEventListener('click', () => {
        const h = getHistory();
        h.splice(i, 1);
        saveHistory(h);
        renderHistory();
        populateDiffSelects();
      });
      tdAct.appendChild(btnDel);
      tr.appendChild(tdAct);
      els.historyBody.appendChild(tr);
    }
  }

  // ── Diff ──
  function populateDiffSelects() {
    const hist = getHistory();
    [els.diffA, els.diffB].forEach(sel => {
      const val = sel.value;
      sel.innerHTML = '<option value="">— 请选择 —</option>';
      for (let i = 0; i < hist.length; i++) {
        const r = hist[i];
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${new Date(r.timestamp).toLocaleString()} | ${r.modelId} | ${r.nodeId || 'local'}`;
        sel.appendChild(opt);
      }
      sel.value = val;
    });
  }

  function runDiff() {
    const ia = parseInt(els.diffA.value, 10);
    const ib = parseInt(els.diffB.value, 10);
    if (isNaN(ia) || isNaN(ib)) return;
    const hist = getHistory();
    const A = hist[ia], B = hist[ib];
    if (!A || !B) return;

    const byName = {};
    for (const r of (A.results || [])) byName[r.name] = r;

    let html = '';
    html += '<div class="diff-section"><div class="diff-section-title">' + t('page.mtp_bench.diff.aggregate', '汇总对比') + '</div>';
    html += '<table class="diff-table"><thead><tr><th>指标</th><th>A (' + (A.nodeId || 'local') + ')</th><th>B (' + (B.nodeId || 'local') + ')</th><th>Delta</th></tr></thead><tbody>';
    const aggKeys = [
      ['aggregate_accept_rate', 'Acc Rate'],
      ['total_predicted', '总 Pred'],
      ['total_draft', '总 Draft'],
      ['total_draft_accepted', '总 Accepted'],
      ['wall_s_total', 'Wall(s)']
    ];
    for (const [k, label] of aggKeys) {
      const va = A.aggregate && A.aggregate[k];
      const vb = B.aggregate && B.aggregate[k];
      const vaStr = va != null ? formatNum(va) : '-';
      const vbStr = vb != null ? formatNum(vb) : '-';
      let deltaStr = '-';
      let deltaClass = 'diff-zero';
      if (va != null && vb != null) {
        const d = vb - va;
        deltaStr = (d >= 0 ? '+' : '') + formatNum(d);
        deltaClass = d > 0 ? 'diff-pos' : (d < 0 ? 'diff-neg' : 'diff-zero');
      }
      html += `<tr><td>${label}</td><td>${vaStr}</td><td>${vbStr}</td><td class="${deltaClass}">${deltaStr}</td></tr>`;
    }
    html += '</tbody></table></div>';

    html += '<div class="diff-section"><div class="diff-section-title">' + t('page.mtp_bench.diff.per_prompt', '逐 Prompt Acc Rate') + '</div>';
    html += '<table class="diff-table"><thead><tr><th>Prompt</th><th>A</th><th>B</th><th>Delta</th></tr></thead><tbody>';
    for (const rb of (B.results || [])) {
      const ra = byName[rb.name] || {};
      const ar = ra.accept_rate || 0;
      const br = rb.accept_rate || 0;
      const d = br - ar;
      const cls = d > 0 ? 'diff-pos' : (d < 0 ? 'diff-neg' : 'diff-zero');
      html += `<tr><td>${rb.name}</td><td>${formatNum(ar)}</td><td>${formatNum(br)}</td><td class="${cls}">${(d >= 0 ? '+' : '') + formatNum(d)}</td></tr>`;
    }
    html += '</tbody></table></div>';
    els.diffResult.innerHTML = html;
  }

  // ── Export ──
  function exportJson() {
    if (!currentRunResult) {
      setStatus(t('page.mtp_bench.status.no_result_to_export', '无结果可导出'));
      return;
    }
    const blob = new Blob([JSON.stringify(currentRunResult, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mtp_bench_${currentRunResult.modelId}_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function formatResultsAsText() {
    if (!currentRunResult) return '';
    const results = currentRunResult.results || [];
    const agg = currentRunResult.aggregate || {};
    const maxNameLen = Math.max(16, ...results.map(r => (r.name || '').length));
    const lines = [];
    for (const r of results) {
      const name = (r.name || '').padEnd(maxNameLen);
      const pred = (r.predicted_n != null ? String(r.predicted_n) : '-').padStart(3);
      const draft = (r.draft_n != null ? String(r.draft_n) : '-').padStart(3);
      const acc = (r.draft_n_accepted != null ? String(r.draft_n_accepted) : '-').padStart(3);
      const rate = r.accept_rate != null ? r.accept_rate.toFixed(3) : '-----';
      const toks = r.predicted_per_second != null ? r.predicted_per_second.toFixed(1) : '-----';
      lines.push(`${name}  pred= ${pred} draft= ${draft} acc= ${acc} rate=${rate} tok/s=${toks}`);
    }
    const aggObj = {
      n_requests: agg.n_requests || results.length,
      total_predicted: agg.total_predicted || 0,
      total_draft: agg.total_draft || 0,
      total_draft_accepted: agg.total_draft_accepted || 0,
      aggregate_accept_rate: agg.aggregate_accept_rate != null ? agg.aggregate_accept_rate : null,
      wall_s_total: agg.wall_s_total != null ? agg.wall_s_total : null
    };
    lines.push('');
    lines.push('Aggregate: ' + JSON.stringify(aggObj, null, 2));
    return lines.join('\n');
  }

  function copyText() {
    if (!currentRunResult) {
      setStatus(t('page.mtp_bench.status.no_result_to_export', '无结果可导出'));
      return;
    }
    const text = formatResultsAsText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        setStatus(t('page.mtp_bench.status.copied', '已复制到剪贴板'));
      }).catch(() => { fallbackCopy(text); });
    } else { fallbackCopy(text); }
  }

  function fallbackCopy(text) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setStatus(t('page.mtp_bench.status.copied', '已复制到剪贴板'));
    } catch(e) {
      setStatus(t('page.mtp_bench.status.copy_failed', '复制失败'));
    }
  }

  // ── Help ──
  function buildHelpContent() {
    const items = [
      ['Pred', 'predicted_n', '模型实际生成的 token 数量（即最终输出的 token 数）'],
      ['Draft', 'draft_n', 'MTP 阶段生成的草稿 token 总数（预测 token 数）'],
      ['Acc', 'draft_n_accepted', '草稿中被主模型接受的 token 数量'],
      ['Acc Rate', 'accept_rate', '接受率 = Acc / Draft，衡量 MTP 预测准确度'],
      ['tok/s', 'predicted_per_second', '吞吐量 = Pred / Wall(s)，每秒生成 token 数'],
      ['Wall(s)', 'wall_s', '挂钟时间，单次请求从发送到完成的全部耗时（秒）']
    ];
    let html = '<div style="line-height:1.65; font-size:13px;">';
    html += '<p style="margin:0 0 12px; color:var(--text-secondary);">' + t('page.mtp_bench.help.intro', 'MTP Benchmark 对模型的多 Token 预测（MTP / Speculative Decoding）能力进行基准测试。以下是结果表中各列的含义：') + '</p>';
    for (const [, key, desc] of items) {
      html += '<div style="margin-bottom:8px;"><strong style="color:var(--primary-color);">' + key + '</strong><br><span style="color:var(--text-secondary);">' + desc + '</span></div>';
    }
    html += '<hr style="border:none; border-top:1px solid var(--border-color); margin:14px 0;">';
    html += '<p style="margin:0; color:var(--text-secondary); font-size:12px;">' + t('page.mtp_bench.help.note', '提示：Acc Rate 越高说明 MTP 预测越准确，tok/s 越高说明吞吐量越好。两者需结合 Wall(s) 综合评估。') + '</p>';
    html += '</div>';
    return html;
  }

  function showHelp() {
    els.helpContent.innerHTML = buildHelpContent();
    els.diffModal.style.display = 'none';
    els.helpModal.style.display = 'flex';
  }

  // ── Events ──
  els.runBtn.addEventListener('click', runBenchmark);
  els.refreshBtn.addEventListener('click', () => { loadModels(); renderHistory(); populateDiffSelects(); });
  els.exportBtn.addEventListener('click', exportJson);
  els.copyTextBtn.addEventListener('click', copyText);
  els.helpBtn.addEventListener('click', showHelp);
  els.clearHistoryBtn.addEventListener('click', () => {
    if (confirm(t('page.mtp_bench.confirm.clear_history', '确定清空所有历史记录？'))) {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
      populateDiffSelects();
    }
  });
  els.modelSearchInput.addEventListener('input', e => {
    modelFilterText = (e.target.value || '').trim();
    renderModelList();
  });
  els.modelList.addEventListener('click', e => {
    const btn = e.target.closest('button[data-model-id]');
    if (!btn) return;
    selectedModelId = btn.dataset.modelId;
    const nid = btn.dataset.nodeId || 'local';
    selectedNodeId = nid;
    if (els.nodeSelect.value !== nid) els.nodeSelect.value = nid;
    renderModelList();
  });
  els.nodeSelect.addEventListener('change', () => { selectedNodeId = els.nodeSelect.value; renderModelList(); });
  els.diffRunBtn.addEventListener('click', runDiff);
  els.closeDiffBtn.addEventListener('click', () => { els.diffModal.style.display = 'none'; });
  els.closeHelpBtn.addEventListener('click', () => { els.helpModal.style.display = 'none'; });

  // Show diff modal on demand
  function toggleDiffPanel() {
    const visible = els.diffModal.style.display !== 'none';
    els.diffModal.style.display = visible ? 'none' : 'flex';
    if (!visible) populateDiffSelects();
  }

  // Add diff toggle button to top bar
  const diffToggleBtn = document.createElement('button');
  diffToggleBtn.className = 'btn';
  diffToggleBtn.textContent = t('page.mtp_bench.action.diff', '对比');
  diffToggleBtn.addEventListener('click', toggleDiffPanel);
  els.refreshBtn.parentElement.insertBefore(diffToggleBtn, els.refreshBtn);

  // ── Init ──
  function init() {
    document.title = t('page.mtp_bench.title', 'MTP Benchmark');
    loadModels();
    renderHistory();
    populateDiffSelects();
  }

  function initOnce() {
    window.removeEventListener('i18n:ready', initOnce);
    init();
  }
  window.addEventListener('i18n:ready', initOnce);
  if (window.I18N) initOnce();
})();
</script>
</body>
</html>
